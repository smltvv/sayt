<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Товар</title>
<style>
body{font-family:Arial,sans-serif;background:#0a0a0a;color:#e8e8e8;padding:20px}
.container{max-width:800px;margin:0 auto}
.back{color:#888;text-decoration:none;display:inline-block;margin-bottom:20px}
.back:hover{color:#fff}
.product{display:grid;grid-template-columns:1fr 1fr;gap:30px}
.img-main{width:100%;border-radius:8px;max-height:400px;object-fit:contain;background:#111}
.thumbnails{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.thumb{width:70px;height:70px;object-fit:cover;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:0.3s}
.thumb:hover,.thumb.active{border-color:#555}
.info h1{margin:0 0 10px 0}
.price{font-size:24px;color:#e8e8e8;margin:10px 0}
.desc{color:#888;line-height:1.6}
.stock{display:inline-block;padding:4px 12px;border-radius:20px;font-size:14px;margin:10px 0}
.in-stock{background:#1a3a1a;color:#51cf66}
.out-stock{background:#3a1a1a;color:#ff6b6b}
.btn{background:#222;border:1px solid #444;color:#e8e8e8;padding:10px 20px;border-radius:6px;cursor:pointer;margin-right:10px;transition:0.3s}
.btn:hover{background:#333}
.reviews{margin-top:30px;border-top:1px solid #222;padding-top:20px}
.review{background:#111;padding:12px;border-radius:6px;margin:10px 0}
.review-name{color:#888;font-size:14px}
.review-rating{color:#fcc419;letter-spacing:2px}
.review-text{color:#ccc;margin:5px 0 0 0}
.review-actions{display:flex;gap:8px;margin-top:6px}
.review-actions button{background:transparent;border:1px solid #333;color:#666;padding:2px 10px;border-radius:4px;cursor:pointer;font-size:12px}
.review-actions button:hover{background:#222;color:#fff}
.add-review{margin-top:20px;background:#111;padding:20px;border-radius:8px;border:1px solid #222}
.add-review h4{margin:0 0 12px 0;font-weight:300}
.add-review textarea{width:100%;padding:10px;background:#1a1a1a;border:1px solid #333;color:#e8e8e8;border-radius:6px;min-height:80px;resize:vertical}
.add-review .rating-select{display:flex;gap:8px;margin:10px 0}
.add-review .rating-select button{background:transparent;border:1px solid #333;color:#666;padding:6px 14px;border-radius:4px;cursor:pointer;transition:0.3s}
.add-review .rating-select button:hover,.add-review .rating-select button.active{background:#222;border-color:#555;color:#fff}
.add-review .btn-submit{background:#222;border:1px solid #444;color:#e8e8e8;padding:10px 30px;border-radius:6px;cursor:pointer;margin-top:10px;transition:0.3s}
.add-review .btn-submit:hover{background:#333}
.error{color:#ff6b6b;text-align:center;padding:50px 0}
.notif{position:fixed;bottom:20px;right:20px;background:#1a1a1a;border:1px solid #333;padding:12px 24px;border-radius:8px;z-index:999;max-width:300px}
</style>
</head>
<body>
<div class="container">
    <a href="/sayt/index.html" class="back">← На главную</a>
    <div id="productContent" class="product"></div>
    <div id="reviewsSection" class="reviews"></div>
</div>

<script>

var currentUser = null;
var selectedRating = 5;
var currentProductId = null;


function loadUser() {
    var saved = localStorage.getItem('user');
    if (saved) {
        try {
            currentUser = JSON.parse(saved);
          
            var users = JSON.parse(localStorage.getItem('users') || '[]');
            var found = users.find(function(u) { return u.id === currentUser.id; });
            if (found) {
                currentUser = found;
                localStorage.setItem('user', JSON.stringify(found));
            }
        } catch(e) {
            currentUser = null;
        }
    }
}


function saveUserToStorage(user) {
    var users = JSON.parse(localStorage.getItem('users') || '[]');
    var idx = users.findIndex(function(u) { return u.id === user.id; });
    if (idx > -1) {
        users[idx] = user;
    } else {
        users.push(user);
    }
    localStorage.setItem('users', JSON.stringify(users));
    localStorage.setItem('user', JSON.stringify(user));
    currentUser = user;
}


function showNotif(msg) {
    var d = document.createElement('div');
    d.className = 'notif';
    d.textContent = msg;
    document.body.appendChild(d);
    setTimeout(function() { d.remove(); }, 3000);
}


document.addEventListener('DOMContentLoaded', function() {
    loadUser();
    
    var params = new URLSearchParams(window.location.search);
    currentProductId = parseInt(params.get('id'));
    
    var content = document.getElementById('productContent');
    var reviewsSection = document.getElementById('reviewsSection');
    
    if (!currentProductId || isNaN(currentProductId)) {
        content.innerHTML = '<div class="error">❌ Товар не найден (нет ID)</div>';
        return;
    }
    
 
    fetch('https://dummyjson.com/products/' + currentProductId)
        .then(function(response) {
            if (!response.ok) throw new Error('Товар не найден');
            return response.json();
        })
        .then(function(product) {
            var stars = '★'.repeat(Math.floor(product.rating)) + '☆'.repeat(5 - Math.floor(product.rating));
            var stockClass = product.stock > 0 ? 'in-stock' : 'out-stock';
            var stockText = product.stock > 0 ? '✅ В наличии (' + product.stock + ' шт.)' : '❌ Нет в наличии';
            
            var thumbsHtml = '';
            var allImages = [product.thumbnail];
            if (product.images && product.images.length > 0) {
                allImages = allImages.concat(product.images);
            }
            
            thumbsHtml = allImages.slice(0, 4).map(function(img, index) {
                var active = index === 0 ? 'active' : '';
                return '<img src="' + img + '" class="thumb ' + active + '" onclick="changeMainImage(this, \'' + img + '\')">';
            }).join('');
            
            content.innerHTML = `
                <div>
                    <img src="${product.thumbnail}" alt="${product.title}" class="img-main" id="mainImage">
                    <div class="thumbnails">${thumbsHtml}</div>
                </div>
                <div class="info">
                    <h1>${product.title}</h1>
                    <div style="color:#888;font-size:14px">${stars} ${product.rating}</div>
                    <div class="price">${product.price} ₽</div>
                    <div class="stock ${stockClass}">${stockText}</div>
                    <div class="desc">${product.description || 'Описание отсутствует'}</div>
                    <div style="margin-top:15px">
                        <button class="btn" onclick="addToCart(${product.id}, '${product.title}', ${product.price}, '${product.thumbnail}')">
                            🛒 В корзину
                        </button>
                        <button class="btn" onclick="toggleFavorite(${product.id})">
                            ❤️ В избранное
                        </button>
                    </div>
                    ${product.brand ? '<div style="color:#888;font-size:14px;margin-top:10px">Бренд: ' + product.brand + '</div>' : ''}
                    ${product.category ? '<div style="color:#888;font-size:14px">Категория: ' + product.category + '</div>' : ''}
                </div>
            `;
            
            
            loadReviews(currentProductId);
        })
        .catch(function(error) {
            content.innerHTML = '<div class="error">❌ ' + error.message + '</div>';
        });
});


function loadReviews(productId) {
    var reviewsSection = document.getElementById('reviewsSection');
    var allReviews = [];
    

    fetch('https://dummyjson.com/products/' + productId + '/reviews')
        .then(function(r) {
            if (!r.ok) throw new Error('Нет отзывов');
            return r.json();
        })
        .then(function(data) {
            var apiReviews = data.reviews || [];
       
            apiReviews.forEach(function(r) {
                r.isApi = true;
                r.userId = 'api_' + r.reviewerEmail || 'api';
            });
            allReviews = allReviews.concat(apiReviews);
            
    
            var allUsers = JSON.parse(localStorage.getItem('users') || '[]');
            allUsers.forEach(function(user) {
                if (user.reviews && user.reviews.length > 0) {
                    user.reviews.forEach(function(review) {
                        if (review.productId === productId) {
                            review.userName = user.name;
                            review.userId = user.id;
                            review.isApi = false;
                            allReviews.push(review);
                        }
                    });
                }
            });
            
            renderReviews(allReviews, productId);
        })
        .catch(function() {
     
            var allUsers = JSON.parse(localStorage.getItem('users') || '[]');
            allUsers.forEach(function(user) {
                if (user.reviews && user.reviews.length > 0) {
                    user.reviews.forEach(function(review) {
                        if (review.productId === productId) {
                            review.userName = user.name;
                            review.userId = user.id;
                            review.isApi = false;
                            allReviews.push(review);
                        }
                    });
                }
            });
            renderReviews(allReviews, productId);
        });
}


function renderReviews(reviews, productId) {
    var reviewsSection = document.getElementById('reviewsSection');
    

    reviews.sort(function(a, b) {
        var dateA = a.date || a.createdAt || 0;
        var dateB = b.date || b.createdAt || 0;
        return new Date(dateB) - new Date(dateA);
    });
    
    var html = '<h3>📝 Отзывы (' + reviews.length + ')</h3>';
    
    if (reviews.length > 0) {
        reviews.forEach(function(r) {
            var revStars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
            var isOwner = currentUser && r.userId === currentUser.id;
            var isApiReview = r.isApi === true;
            
            html += '<div class="review" data-id="' + (r.id || '') + '">';
            html += '<div class="review-name">' + (r.reviewerName || r.userName || 'Аноним') + 
                    (isOwner ? ' <span style="color:#fcc419;font-size:12px">(вы)</span>' : '') +
                    (isApiReview ? ' <span style="color:#666;font-size:12px">(из магазина)</span>' : '') +
                    '</div>';
            html += '<div class="review-rating">' + revStars + '</div>';
            html += '<p class="review-text">' + (r.comment || r.text || '') + '</p>';
            
            // Кнопки для своих отзывов
            if (isOwner && !isApiReview) {
                html += '<div class="review-actions">';
                html += '<button onclick="editReview(' + productId + ', \'' + (r.id || '') + '\')">✏️</button>';
                html += '<button onclick="deleteReview(' + productId + ', \'' + (r.id || '') + '\')">🗑️</button>';
                html += '</div>';
            }
            
            html += '</div>';
        });
    } else {
        html += '<p style="color:#888">📭 Нет отзывов. Будьте первым!</p>';
    }
    

    if (currentUser) {
        html += `
            <div class="add-review">
                <h4>✍️ Оставить отзыв</h4>
                <div class="rating-select">
                    ${[1,2,3,4,5].map(function(i) {
                        var active = i === 5 ? 'active' : '';
                        return '<button class="' + active + '" onclick="selectRating(' + i + ')">' + i + '★</button>';
                    }).join('')}
                </div>
                <textarea id="reviewText" placeholder="Поделитесь впечатлениями о товаре..."></textarea>
                <button class="btn-submit" onclick="submitReview(' + productId + ')">📤 Отправить отзыв</button>
            </div>
        `;
    } else {
        html += `
            <div style="margin-top:20px;padding:16px;background:#111;border-radius:8px;border:1px solid #222;text-align:center;color:#888">
                🔒 <a href="/sayt/index.html" style="color:#fcc419;text-decoration:none">Войдите</a>, чтобы оставить отзыв
            </div>
        `;
    }
    
    reviewsSection.innerHTML = html;
}


function selectRating(rating) {
    selectedRating = rating;
    document.querySelectorAll('.rating-select button').forEach(function(b) {
        b.classList.remove('active');
        if (parseInt(b.textContent) === rating) {
            b.classList.add('active');
        }
    });
}


function submitReview(productId) {
    var text = document.getElementById('reviewText').value.trim();
    
    if (!text || text.length < 3) {
        showNotif('Напишите отзыв (минимум 3 символа)');
        return;
    }
    
    if (!currentUser) {
        showNotif('Войдите в систему');
        return;
    }
    
    var review = {
        id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
        productId: productId,
        userId: currentUser.id,
        userName: currentUser.name || 'Пользователь',
        rating: selectedRating || 5,
        text: text,
        comment: text,
        date: new Date().toISOString(),
        isApi: false
    };
    

    if (!currentUser.reviews) {
        currentUser.reviews = [];
    }
    currentUser.reviews.push(review);
    

    saveUserToStorage(currentUser);
    
    showNotif('✅ Отзыв добавлен!');
    document.getElementById('reviewText').value = '';
    

    loadReviews(productId);
}


function deleteReview(productId, reviewId) {
    if (!confirm('Удалить отзыв?')) return;
    
    if (!currentUser) {
        showNotif('Войдите в систему');
        return;
    }
    

    if (currentUser.reviews) {
        currentUser.reviews = currentUser.reviews.filter(function(r) {
            return r.id !== reviewId;
        });
        saveUserToStorage(currentUser);
        showNotif('🗑️ Отзыв удален');
        loadReviews(productId);
    }
}


function editReview(productId, reviewId) {
    if (!currentUser) {
        showNotif('Войдите в систему');
        return;
    }
    
    var review = currentUser.reviews.find(function(r) { return r.id === reviewId; });
    
    if (!review) {
        showNotif('Отзыв не найден');
        return;
    }
    
    var newText = prompt('Редактировать отзыв:', review.text);
    if (newText && newText.trim().length >= 3) {
        review.text = newText.trim();
        review.comment = newText.trim();
        saveUserToStorage(currentUser);
        showNotif('✅ Отзыв обновлен');
        loadReviews(productId);
    } else if (newText !== null) {
        showNotif('Минимум 3 символа');
    }
}


function changeMainImage(el, src) {
    document.querySelectorAll('.thumb').forEach(function(t) { t.classList.remove('active'); });
    el.classList.add('active');
    document.getElementById('mainImage').src = src;
}


function addToCart(id, title, price, img) {
    var cart = JSON.parse(localStorage.getItem('cart') || '[]');
    var exist = cart.find(function(item) { return item.id === id; });
    if (exist) { exist.qty++; } else { cart.push({ id: id, title: title, price: price, qty: 1, img: img }); }
    localStorage.setItem('cart', JSON.stringify(cart));
    showNotif('✅ Товар добавлен в корзину!');
}


function toggleFavorite(id) {
    var favs = JSON.parse(localStorage.getItem('favorites') || '[]');
    var index = favs.indexOf(id);
    if (index > -1) { favs.splice(index, 1); showNotif('❌ Удалено из избранного'); } 
    else { favs.push(id); showNotif('❤️ Добавлено в избранное'); }
    localStorage.setItem('favorites', JSON.stringify(favs));
}
</script>
</body>
</html>
