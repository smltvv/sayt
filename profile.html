<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>void · профиль</title>
<link rel="stylesheet" href="/sayt/css/main.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
.profile-wrap{display:grid;grid-template-columns:300px 1fr;gap:28px;padding:40px 0}
.profile-sidebar{background:var(--bg2);padding:32px;border:1px solid var(--border);border-radius:var(--radius);text-align:center}
.profile-sidebar .avatar{font-size:80px;color:var(--fg2);margin-bottom:12px}
.profile-sidebar h2{font-weight:300;font-size:22px;margin:12px 0 4px}
.profile-sidebar p{color:var(--fg2);font-size:14px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:24px}
.stat{background:var(--bg3);padding:16px;border-radius:var(--radius-sm)}
.stat-val{font-size:28px;font-weight:300;display:block}
.stat-label{font-size:12px;color:var(--fg2)}
.profile-content{display:flex;flex-direction:column;gap:24px}
.profile-section{background:var(--bg2);padding:28px;border:1px solid var(--border);border-radius:var(--radius)}
.profile-section h3{font-weight:300;font-size:17px;margin-bottom:16px;letter-spacing:1px}
.profile-input{width:100%;padding:12px 16px;margin:8px 0;background:var(--bg3);border:1px solid var(--border);color:var(--fg);border-radius:var(--radius);transition:all .4s}
.profile-input:focus{outline:none;border-color:var(--accent2)}
.review-item{background:var(--bg3);padding:14px;border:1px solid var(--border);border-radius:var(--radius-sm);margin:8px 0;transition:0.3s}
.review-item:hover{border-color:var(--accent2)}
.review-item .review-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.review-item .review-product{color:var(--fg);font-weight:500}
.review-item .review-rating{color:#fcc419;letter-spacing:2px}
.review-item .review-text{color:var(--fg2);margin:6px 0 0 0;font-size:14px}
.review-item .review-date{color:var(--fg3);font-size:12px}
.review-item .review-actions{display:flex;gap:8px;margin-top:8px}
.review-item .review-actions button{background:transparent;border:1px solid var(--border);color:var(--fg2);padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px;transition:0.3s}
.review-item .review-actions button:hover{background:var(--accent);color:var(--fg)}
.empty-msg{color:var(--fg2);padding:20px 0;text-align:center}
@media(max-width:768px){.profile-wrap{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app">
<header class="header">
<div class="container header-wrap">
<a href="/sayt/index.html" class="logo">⨁</a>
<div class="actions">
<a href="/sayt/favorites.html" class="icon-btn"><i class="fas fa-heart"></i><span class="badge" id="favCount">0</span></a>
<a href="/sayt/cart.html" class="icon-btn"><i class="fas fa-shopping-bag"></i><span class="badge" id="cartCount">0</span></a>
<button id="logoutBtn" class="icon-btn"><i class="fas fa-sign-out-alt"></i></button>
</div>
</div>
</header>
<main class="profile">
<div class="container">
<div class="profile-wrap">
<div class="profile-sidebar">
<div class="avatar"><i class="fas fa-user-circle" style="font-size:80px"></i></div>
<h2 id="profileName">пользователь</h2>
<p id="profileEmail">email</p>
<div class="stats">
<div class="stat"><span class="stat-val" id="bonusCount">0</span><span class="stat-label">бонусов</span></div>
<div class="stat"><span class="stat-val" id="orderCount">0</span><span class="stat-label">заказов</span></div>
</div>
</div>
<div class="profile-content">
<div class="profile-section">
<h3>редактировать профиль</h3>
<input type="text" id="editName" placeholder="имя" class="profile-input">
<input type="email" id="editEmail" placeholder="email" class="profile-input">
<button id="saveProfile" class="btn-dark">сохранить</button>
</div>
<div class="profile-section">
<h3>мои заказы</h3>
<div id="ordersList"></div>
</div>
<div class="profile-section">
<h3>мои отзывы</h3>
<div id="reviewsList"></div>
</div>
</div>
</div>
</div>
</main>
</div>
<script>
var cu=null;
var prods=[];

function loadUser(){
var s=localStorage.getItem('user');
if(!s){window.location.href='/sayt/index.html';return;}
try{cu=JSON.parse(s);var us=JSON.parse(localStorage.getItem('users')||'[]');var f=us.find(function(u){return u.id===cu.id;});if(f){cu=f;localStorage.setItem('user',JSON.stringify(f));}}catch(e){window.location.href='/sayt/index.html';}
}

function saveUser(){
var us=JSON.parse(localStorage.getItem('users')||'[]');
var idx=us.findIndex(function(u){return u.id===cu.id;});
if(idx>-1){us[idx]=cu;}else{us.push(cu);}
localStorage.setItem('users',JSON.stringify(us));
localStorage.setItem('user',JSON.stringify(cu));
}

function loadProds(){
var s=localStorage.getItem('products');
if(s){try{prods=JSON.parse(s);}catch(e){prods=[];}}
if(prods.length===0){fetch('https://dummyjson.com/products?limit=100').then(function(r){return r.json();}).then(function(d){prods=d.products;localStorage.setItem('products',JSON.stringify(prods));renderProfile();}).catch(function(){renderProfile();});}else{renderProfile();}
}

function getTitle(id){
for(var i=0;i<prods.length;i++){if(prods[i].id===id){return prods[i].title;}}
return 'Товар #'+id;
}

function renderProfile(){
if(!cu)return;
document.getElementById('profileName').textContent=cu.name||'Пользователь';
document.getElementById('profileEmail').textContent=cu.email||'';
document.getElementById('bonusCount').textContent=cu.bonus||0;
document.getElementById('orderCount').textContent=(cu.orders||[]).length;
document.getElementById('editName').value=cu.name||'';
document.getElementById('editEmail').value=cu.email||'';
var ol=document.getElementById('ordersList');
var ords=cu.orders||[];
if(ords.length>0){var h='';ords.forEach(function(oid){var all=JSON.parse(localStorage.getItem('orders')||'[]');var o=all.find(function(x){return x.id===oid;});if(o){h+='<div style="padding:12px;border:1px solid var(--border);border-radius:8px;margin:6px 0">заказ #'+o.id+' | '+o.items.length+' товаров | '+o.total+' ₽ | '+new Date(o.date).toLocaleDateString()+'</div>';}});ol.innerHTML=h||'<p class="empty-msg">нет заказов</p>';}else{ol.innerHTML='<p class="empty-msg">нет заказов</p>';}
var rl=document.getElementById('reviewsList');
var revs=cu.reviews||[];
if(revs.length>0){revs.sort(function(a,b){return new Date(b.date||0)-new Date(a.date||0);});var h2='';revs.forEach(function(r){var st='★'.repeat(r.rating)+'☆'.repeat(5-r.rating);var pn=getTitle(r.productId);h2+='<div class="review-item" data-id="'+r.id+'"><div class="review-header"><span class="review-product">📦 '+pn+'</span><span class="review-date">'+new Date(r.date).toLocaleDateString()+'</span></div><div class="review-rating">'+st+'</div><div class="review-text">'+(r.text||r.comment||'')+'</div><div class="review-actions"><button onclick="editRev(\''+r.id+'\')">✏️</button><button onclick="delRev(\''+r.id+'\')">🗑️</button></div></div>';});rl.innerHTML=h2;}else{rl.innerHTML='<p class="empty-msg">📭 нет отзывов</p>';}
}

function editRev(rid){
if(!cu)return;
var rev=null;if(cu.reviews){for(var i=0;i<cu.reviews.length;i++){if(cu.reviews[i].id===rid){rev=cu.reviews[i];break;}}}
if(!rev){alert('не найдено');return;}
var nt=prompt('Редактировать:',rev.text||rev.comment||'');
if(nt&&nt.trim().length>=3){rev.text=nt.trim();rev.comment=nt.trim();saveUser();renderProfile();alert('✅ обновлено');}else if(nt!==null){alert('минимум 3');}
}

function delRev(rid){
if(!cu)return;
if(!confirm('Удалить?'))return;
cu.reviews=cu.reviews.filter(function(r){return r.id!==rid;});
saveUser();renderProfile();alert('🗑️ удалено');
}

document.getElementById('saveProfile')?.addEventListener('click',function(){
var nm=document.getElementById('editName').value.trim();
var em=document.getElementById('editEmail').value.trim();
if(nm&&em){cu.name=nm;cu.email=em;saveUser();renderProfile();alert('✅ сохранено');}else{alert('заполните все поля');}
});

document.getElementById('logoutBtn')?.addEventListener('click',function(){
localStorage.removeItem('token');
localStorage.removeItem('user');
window.location.href='/sayt/index.html';
});

document.addEventListener('DOMContentLoaded',function(){
loadUser();loadProds();
var cart=JSON.parse(localStorage.getItem('cart')||'[]');
var favs=JSON.parse(localStorage.getItem('favorites')||'[]');
document.getElementById('cartCount').textContent=cart.reduce(function(s,i){return s+i.qty;},0);
document.getElementById('favCount').textContent=favs.length;
});
</script>
</body>
</html>
