<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Товар</title>
<style>
body{font-family:Arial,sans-serif;background:#0a0a0a;color:#e8e8e8;padding:20px}
.container{max-width:800px;margin:0 auto}
.back{color:#888;text-decoration:none;display:inline-block;margin-bottom:20px}
.product{display:grid;grid-template-columns:1fr 1fr;gap:30px}
.img{width:100%;border-radius:8px}
.info h1{margin:0 0 10px 0}
.price{font-size:24px;color:#e8e8e8;margin:10px 0}
.desc{color:#888;line-height:1.6}
.btn{background:#222;border:1px solid #444;color:#e8e8e8;padding:10px 20px;border-radius:6px;cursor:pointer;margin-right:10px;transition:0.3s}
.btn:hover{background:#333}
.reviews{margin-top:30px;border-top:1px solid #222;padding-top:20px}
.review{background:#111;padding:12px;border-radius:6px;margin:10px 0}
.error{color:#ff6b6b;text-align:center;padding:50px 0}
</style>
</head>
<body>
<div class="container">
    <a href="/sayt/index.html" class="back">← На главную</a>
    <div id="productContent" class="product"></div>
    <div id="reviewsSection" class="reviews"></div>
</div>

<script>
// Ждем загрузки страницы
document.addEventListener('DOMContentLoaded', function() {
    // Получаем ID товара из URL
    var params = new URLSearchParams(window.location.search);
    var productId = parseInt(params.get('id'));
    
    var content = document.getElementById('productContent');
    var reviewsSection = document.getElementById('reviewsSection');
    
    // Проверяем, что ID есть
    if (!productId || isNaN(productId)) {
        content.innerHTML = '<div class="error">❌ Товар не найден (нет ID)</div>';
        return;
    }
    
    // Загружаем данные с DummyJSON API напрямую
    fetch('https://dummyjson.com/products/' + productId)
        .then(function(response) {
            if (!response.ok) {
                throw new Error('Товар не найден');
            }
            return response.json();
        })
        .then(function(product) {
            // Показываем товар
            var stars = '★'.repeat(Math.floor(product.rating)) + '☆'.repeat(5 - Math.floor(product.rating));
            
            content.innerHTML = `
                <div>
                    <img src="${product.thumbnail}" alt="${product.title}" class="img">
                    ${product.images ? product.images.slice(0,3).map(img => `<img src="${img}" style="width:80px;height:80px;object-fit:cover;border-radius:4px;margin:4px;cursor:pointer" onclick="this.parentElement.querySelector('.img').src=this.src">`).join('') : ''}
                </div>
                <div class="info">
                    <h1>${product.title}</h1>
                    <div style="color:#888">${stars} ${product.rating}</div>
                    <div class="price">${product.price} ₽</div>
                    <div class="desc">${product.description || 'Описание отсутствует'}</div>
                    <div style="margin:15px 0;color:${product.stock > 0 ? '#51cf66' : '#ff6b6b'}">
                        ${product.stock > 0 ? '✅ В наличии' : '❌ Нет в наличии'}
                    </div>
                    <div>
                        <button class="btn" onclick="addToCart(${product.id}, '${product.title}', ${product.price}, '${product.thumbnail}')">
                            🛒 В корзину
                        </button>
                        <button class="btn" onclick="toggleFavorite(${product.id})">
                            ❤️ В избранное
                        </button>
                    </div>
                </div>
            `;
            
            // Загружаем отзывы
            fetch('https://dummyjson.com/products/' + productId + '/reviews')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.reviews && data.reviews.length > 0) {
                        reviewsSection.innerHTML = '<h3>Отзывы (' + data.reviews.length + ')</h3>' + 
                            data.reviews.map(function(r) {
                                return '<div class="review">' +
                                    '<strong>' + r.reviewerName + '</strong> ' + '★'.repeat(r.rating) +
                                    '<p>' + r.comment + '</p>' +
                                    '</div>';
                            }).join('');
                    } else {
                        reviewsSection.innerHTML = '<p style="color:#888">Нет отзывов</p>';
                    }
                })
                .catch(function() {
                    reviewsSection.innerHTML = '<p style="color:#888">Не удалось загрузить отзывы</p>';
                });
        })
        .catch(function(error) {
            content.innerHTML = '<div class="error">❌ ' + error.message + '</div>';
        });
});

// Функция добавления в корзину
function addToCart(id, title, price, img) {
    var cart = JSON.parse(localStorage.getItem('cart') || '[]');
    var exist = cart.find(function(item) { return item.id === id; });
    
    if (exist) {
        exist.qty++;
    } else {
        cart.push({ id: id, title: title, price: price, qty: 1, img: img });
    }
    
    localStorage.setItem('cart', JSON.stringify(cart));
    alert('✅ Товар добавлен в корзину!');
}

// Функция добавления в избранное
function toggleFavorite(id) {
    var favs = JSON.parse(localStorage.getItem('favorites') || '[]');
    var index = favs.indexOf(id);
    
    if (index > -1) {
        favs.splice(index, 1);
        alert('❌ Удалено из избранного');
    } else {
        favs.push(id);
        alert('❤️ Добавлено в избранное');
    }
    
    localStorage.setItem('favorites', JSON.stringify(favs));
}
</script>
</body>
</html>
