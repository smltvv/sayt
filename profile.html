<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>void · профиль</title>
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="app">
<header class="header">
<div class="container header-wrap">
<a href="index.html" class="logo">⨁</a>
<div class="actions">
<a href="favorites.html" class="icon-btn"><i class="fas fa-heart"></i><span class="badge" id="favCount">0</span></a>
<a href="cart.html" class="icon-btn"><i class="fas fa-shopping-bag"></i><span class="badge" id="cartCount">0</span></a>
<button id="logoutBtn" class="icon-btn"><i class="fas fa-sign-out-alt"></i></button>
</div>
</div>
</header>
<main class="profile">
<div class="container">
<div class="profile-wrap">
<div class="profile-sidebar">
<div class="avatar"><i class="fas fa-user-circle" style="font-size:80px"></i></div>
<h2 id="profileName">пользователь</h2>
<p id="profileEmail">email</p>
<div class="stats">
<div class="stat"><span class="stat-val" id="bonusCount">0</span><span class="stat-label">бонусов</span></div>
<div class="stat"><span class="stat-val" id="orderCount">0</span><span class="stat-label">заказов</span></div>
</div>
</div>
<div class="profile-content">
<div class="profile-section">
<h3>редактировать профиль</h3>
<input type="text" id="editName" placeholder="имя" class="profile-input">
<input type="email" id="editEmail" placeholder="email" class="profile-input">
<button id="saveProfile" class="btn-dark">сохранить</button>
</div>
<div class="profile-section">
<h3>мои заказы</h3>
<div id="ordersList"></div>
</div>
<div class="profile-section">
<h3>мои отзывы</h3>
<div id="reviewsList"></div>
</div>
</div>
</div>
</div>
</main>
</div>
<script src="js/data.js"></script>
<script src="js/models.js"></script>
<script src="js/viewmodels.js"></script>
<script src="js/views.js"></script>
<script src="js/app.js"></script>
</body>
</html>
