<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Товар</title>
<style>
body{font-family:Arial,sans-serif;background:#0a0a0a;color:#e8e8e8;padding:20px}
.container{max-width:800px;margin:0 auto}
.back{color:#888;text-decoration:none;display:inline-block;margin-bottom:20px}
.back:hover{color:#fff}
.product{display:grid;grid-template-columns:1fr 1fr;gap:30px}
.img-main{width:100%;border-radius:8px;max-height:400px;object-fit:contain;background:#111}
.thumbnails{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.thumb{width:70px;height:70px;object-fit:cover;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:0.3s}
.thumb:hover,.thumb.active{border-color:#555}
.info h1{margin:0 0 10px 0}
.price{font-size:24px;color:#e8e8e8;margin:10px 0}
.desc{color:#888;line-height:1.6}
.stock{display:inline-block;padding:4px 12px;border-radius:20px;font-size:14px;margin:10px 0}
.in-stock{background:#1a3a1a;color:#51cf66}
.out-stock{background:#3a1a1a;color:#ff6b6b}
.btn{background:#222;border:1px solid #444;color:#e8e8e8;padding:10px 20px;border-radius:6px;cursor:pointer;margin-right:10px;transition:0.3s}
.btn:hover{background:#333}
.reviews{margin-top:30px;border-top:1px solid #222;padding-top:20px}
.review{background:#111;padding:12px;border-radius:6px;margin:10px 0}
.review-name{color:#888;font-size:14px}
.review-rating{color:#fcc419;letter-spacing:2px}
.review-text{color:#ccc;margin:5px 0 0 0}
.review-actions{display:flex;gap:8px;margin-top:6px}
.review-actions button{background:transparent;border:1px solid #333;color:#666;padding:2px 10px;border-radius:4px;cursor:pointer;font-size:12px}
.review-actions button:hover{background:#222;color:#fff}
.add-review{margin-top:20px;background:#111;padding:20px;border-radius:8px;border:1px solid #222}
.add-review h4{margin:0 0 12px 0;font-weight:300}
.add-review textarea{width:100%;padding:10px;background:#1a1a1a;border:1px solid #333;color:#e8e8e8;border-radius:6px;min-height:80px;resize:vertical}
.add-review .rating-select{display:flex;gap:8px;margin:10px 0}
.add-review .rating-select button{background:transparent;border:1px solid #333;color:#666;padding:6px 14px;border-radius:4px;cursor:pointer;transition:0.3s}
.add-review .rating-select button:hover,.add-review .rating-select button.active{background:#222;border-color:#555;color:#fff}
.add-review .btn-submit{background:#222;border:1px solid #444;color:#e8e8e8;padding:10px 30px;border-radius:6px;cursor:pointer;margin-top:10px;transition:0.3s}
.add-review .btn-submit:hover{background:#333}
.error{color:#ff6b6b;text-align:center;padding:50px 0}
.notif{position:fixed;bottom:20px;right:20px;background:#1a1a1a;border:1px solid #333;padding:12px 24px;border-radius:8px;z-index:999;max-width:300px}
</style>
</head>
<body>
<div class="container">
    <a href="/sayt/index.html" class="back">← На главную</a>
    <div id="productContent" class="product"></div>
    <div id="reviewsSection" class="reviews"></div>
</div>
<script>
var cu=null;
var sel=5;
var pid=null;
var allprods=[];

function loadUser(){
var s=localStorage.getItem('user');
if(s){try{cu=JSON.parse(s);var us=JSON.parse(localStorage.getItem('users')||'[]');var f=us.find(function(u){return u.id===cu.id;});if(f){cu=f;localStorage.setItem('user',JSON.stringify(f));}}catch(e){cu=null;}}
}

function saveUser(){
var us=JSON.parse(localStorage.getItem('users')||'[]');
var idx=us.findIndex(function(u){return u.id===cu.id;});
if(idx>-1){us[idx]=cu;}else{us.push(cu);}
localStorage.setItem('users',JSON.stringify(us));
localStorage.setItem('user',JSON.stringify(cu));
}

function showNotif(m){
var d=document.createElement('div');
d.className='notif';
d.textContent=m;
document.body.appendChild(d);
setTimeout(function(){d.remove();},3000);
}

function loadProducts(){
var s=localStorage.getItem('products');
if(s){try{allprods=JSON.parse(s);}catch(e){allprods=[];}}
if(allprods.length===0){fetch('https://dummyjson.com/products?limit=100').then(function(r){return r.json();}).then(function(d){allprods=d.products;localStorage.setItem('products',JSON.stringify(allprods));}).catch(function(){})}
}

function getProductTitle(id){
for(var i=0;i<allprods.length;i++){if(allprods[i].id===id){return allprods[i].title;}}
return 'Товар #'+id;
}

document.addEventListener('DOMContentLoaded',function(){
loadUser();loadProducts();
var p=new URLSearchParams(window.location.search);
pid=parseInt(p.get('id'));
var c=document.getElementById('productContent');
var r=document.getElementById('reviewsSection');
if(!pid||isNaN(pid)){c.innerHTML='<div class="error">❌ Товар не найден</div>';return;}
fetch('https://dummyjson.com/products/'+pid).then(function(res){if(!res.ok)throw new Error('404');return res.json();}).then(function(pd){
var stars='★'.repeat(Math.floor(pd.rating))+'☆'.repeat(5-Math.floor(pd.rating));
var sc=pd.stock>0?'in-stock':'out-stock';
var st=pd.stock>0?'✅ В наличии ('+pd.stock+' шт.)':'❌ Нет в наличии';
var thumbs='';var imgs=[pd.thumbnail];if(pd.images&&pd.images.length>0){imgs=imgs.concat(pd.images);}
thumbs=imgs.slice(0,4).map(function(img,i){var a=i===0?'active':'';return '<img src="'+img+'" class="thumb '+a+'" onclick="document.getElementById(\'mainImg\').src=this.src;document.querySelectorAll(\'.thumb\').forEach(function(t){t.classList.remove(\'active\');});this.classList.add(\'active\')">';}).join('');
c.innerHTML='<div><img src="'+pd.thumbnail+'" alt="'+pd.title+'" class="img-main" id="mainImg"><div class="thumbnails">'+thumbs+'</div></div><div class="info"><h1>'+pd.title+'</h1><div style="color:#888;font-size:14px">'+stars+' '+pd.rating+'</div><div class="price">'+pd.price+' ₽</div><div class="stock '+sc+'">'+st+'</div><div class="desc">'+(pd.description||'без описания')+'</div><div style="margin-top:15px"><button class="btn" onclick="addToCart('+pd.id+',\''+pd.title+'\','+pd.price+',\''+pd.thumbnail+'\')">🛒 В корзину</button><button class="btn" onclick="toggleFav('+pd.id+')">❤️ В избранное</button></div>'+(pd.brand?'<div style="color:#888;font-size:14px;margin-top:10px">Бренд: '+pd.brand+'</div>':'')+(pd.category?'<div style="color:#888;font-size:14px">Категория: '+pd.category+'</div>':'')+'</div>';
renderReviews(pid);
}).catch(function(e){c.innerHTML='<div class="error">❌ '+e.message+'</div>';});
});

function renderReviews(pid){
var rs=document.getElementById('reviewsSection');
var allReviews=[];
fetch('https://dummyjson.com/products/'+pid+'/reviews').then(function(r){if(!r.ok)throw new Error('no');return r.json();}).then(function(d){var api=d.reviews||[];api.forEach(function(r){r.isApi=true;r.userId='api_'+r.reviewerEmail||'api';});allReviews=allReviews.concat(api);
var us=JSON.parse(localStorage.getItem('users')||'[]');
us.forEach(function(u){if(u.reviews&&u.reviews.length>0){u.reviews.forEach(function(rev){if(rev.productId===pid){rev.userName=u.name;rev.userId=u.id;rev.isApi=false;allReviews.push(rev);}});}});
renderReviewsList(allReviews,pid);
}).catch(function(){var us=JSON.parse(localStorage.getItem('users')||'[]');
us.forEach(function(u){if(u.reviews&&u.reviews.length>0){u.reviews.forEach(function(rev){if(rev.productId===pid){rev.userName=u.name;rev.userId=u.id;rev.isApi=false;allReviews.push(rev);}});}});
renderReviewsList(allReviews,pid);});
}

function renderReviewsList(reviews,pid){
var rs=document.getElementById('reviewsSection');
reviews.sort(function(a,b){var da=a.date||a.createdAt||0;var db=b.date||b.createdAt||0;return new Date(db)-new Date(da);});
var html='<h3>📝 Отзывы ('+reviews.length+')</h3>';
if(reviews.length>0){reviews.forEach(function(r){var rs2='★'.repeat(r.rating)+'☆'.repeat(5-r.rating);var own=cu&&r.userId===cu.id;var api=r.isApi===true;html+='<div class="review" data-id="'+(r.id||'')+'">';html+='<div class="review-name">'+(r.reviewerName||r.userName||'Аноним')+(own?' <span style="color:#fcc419;font-size:12px">(вы)</span>':'')+(api?' <span style="color:#666;font-size:12px">(из магазина)</span>':'')+'</div>';html+='<div class="review-rating">'+rs2+'</div>';html+='<p class="review-text">'+(r.comment||r.text||'')+'</p>';if(own&&!api){html+='<div class="review-actions"><button onclick="editRev('+pid+',\''+(r.id||'')+'\')">✏️</button><button onclick="delRev('+pid+',\''+(r.id||'')+'\')">🗑️</button></div>';}html+='</div>';});}else{html+='<p style="color:#888">📭 Нет отзывов</p>';}
if(cu){html+='<div class="add-review"><h4>✍️ Оставить отзыв</h4><div class="rating-select">';for(var i=1;i<=5;i++){var a=i===5?'active':'';html+='<button class="'+a+'" onclick="selRat('+i+')">'+i+'★</button>';}html+='</div><textarea id="revText" placeholder="Поделитесь впечатлениями..."></textarea><button class="btn-submit" onclick="subRev('+pid+')">📤 Отправить</button></div>';}else{html+='<div style="margin-top:20px;padding:16px;background:#111;border-radius:8px;border:1px solid #222;text-align:center;color:#888">🔒 <a href="/sayt/index.html" style="color:#fcc419;text-decoration:none">Войдите</a>, чтобы оставить отзыв</div>';}
rs.innerHTML=html;
}

function selRat(r){sel=r;document.querySelectorAll('.rating-select button').forEach(function(b){b.classList.remove('active');if(parseInt(b.textContent)===r){b.classList.add('active');}});}

function subRev(pid){
var t=document.getElementById('revText').value.trim();
if(!t||t.length<3){showNotif('Минимум 3 символа');return;}
if(!cu){showNotif('Войдите');return;}
var rev={id:'user_'+Date.now()+'_'+Math.random().toString(36).substr(2,6),productId:pid,userId:cu.id,userName:cu.name||'Пользователь',rating:sel||5,text:t,comment:t,date:new Date().toISOString(),isApi:false};
if(!cu.reviews){cu.reviews=[];}
cu.reviews.push(rev);
saveUser();
showNotif('✅ Отзыв добавлен!');
document.getElementById('revText').value='';
renderReviews(pid);
}

function delRev(pid,rid){
if(!confirm('Удалить?'))return;
if(!cu){showNotif('Войдите');return;}
if(cu.reviews){cu.reviews=cu.reviews.filter(function(r){return r.id!==rid;});saveUser();showNotif('🗑️ Удалено');renderReviews(pid);}
}

function editRev(pid,rid){
if(!cu){showNotif('Войдите');return;}
var rev=null;if(cu.reviews){for(var i=0;i<cu.reviews.length;i++){if(cu.reviews[i].id===rid){rev=cu.reviews[i];break;}}}
if(!rev){showNotif('Не найдено');return;}
var nt=prompt('Редактировать:',rev.text);
if(nt&&nt.trim().length>=3){rev.text=nt.trim();rev.comment=nt.trim();saveUser();showNotif('✅ Обновлено');renderReviews(pid);}else if(nt!==null){showNotif('Минимум 3 символа');}
}

function addToCart(id,title,price,img){var cart=JSON.parse(localStorage.getItem('cart')||'[]');var ex=cart.find(function(i){return i.id===id;});if(ex){ex.qty++;}else{cart.push({id:id,title:title,price:price,qty:1,img:img});}localStorage.setItem('cart',JSON.stringify(cart));showNotif('✅ В корзину');}
function toggleFav(id){var favs=JSON.parse(localStorage.getItem('favorites')||'[]');var idx=favs.indexOf(id);if(idx>-1){favs.splice(idx,1);showNotif('❌ Удалено');}else{favs.push(id);showNotif('❤️ Добавлено');}localStorage.setItem('favorites',JSON.stringify(favs));}
</script>
</body>
</html>
